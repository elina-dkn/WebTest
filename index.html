<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h2>Workout Froggy</h2>
  <div class="identification">
    <div class="login">
      <input class="userId" id="email" placeholder="Email">
      <input class="userId" id="password" type="password" placeholder="Password">
    </div>

    <div class="buttonsContainer">
      <button class="auth" onclick="login()">Login</button>
      <button class="auth" onclick="register()">Register</button>
    </div>
  </div>




  <script type="module" src="auth.js"></script>
</body>
</html>
